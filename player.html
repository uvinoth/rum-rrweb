<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>RUM Session Replay</title>

  <!-- rrweb player -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/rrweb-player@latest/dist/style.css"
  />
  <script src="https://cdn.jsdelivr.net/npm/rrweb-player@latest/dist/index.js"></script>
</head>

<body>
  <h2>Session Replay</h2>
  <div id="player"></div>

  <script>
    const orgId = 1;
    const sessionId = "ide4e8216315da68";

    fetch(
      `http://localhost:8001/api/v1/rum/${orgId}/${sessionId}/events`
    )
      .then(res => res.json())
      .then(data => {
        if (!data.events || data.events.length === 0) {
          alert("No events found");
          return;
        }

        new rrwebPlayer({
          target: document.getElementById("player"),
          props: {
            events: data.events,
            autoPlay: true,
          },
        });
      })
      .catch(err => {
        console.error("Failed to load events", err);
      });
  </script>
</body>
</html>
